<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ログイン処理中 — Otona Serum Lab Poster</title>
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="shortcut icon" href="./favicon-32.png">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#fffaf6;color:#2b2226;padding:1.5rem;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    line-height:1.8;}
  .card{background:#fff;border:1px solid #f0e2e7;border-radius:20px;padding:2.2rem 1.8rem;
    box-shadow:0 10px 30px rgba(168,73,100,.08);max-width:420px;width:100%;text-align:center;}
  .logo{width:56px;height:56px;border-radius:14px;margin:0 auto .9rem;display:block;}
  h1{font-size:1.15rem;margin:0 0 .5rem;}
  p{margin:.4rem 0;color:#6d5b62;font-size:.95rem;}
  .spin{width:30px;height:30px;border:3px solid #f0e2e7;border-top-color:#c8617f;
    border-radius:50%;animation:s 1s linear infinite;margin:1.3rem auto;}
  @keyframes s{to{transform:rotate(360deg)}}
  .btn{display:none;margin-top:1.1rem;padding:.85rem 1.4rem;border:0;border-radius:999px;
    background:linear-gradient(135deg,#c8617f,#a84964);color:#fff;font-size:.95rem;
    font-weight:700;cursor:pointer;font-family:inherit;}
  .btn:hover{filter:brightness(1.05)}
  .err{background:#fff2f2;border:1px solid #ffd3d3;color:#a33;border-radius:12px;
    padding:.9rem;margin-top:.6rem;font-size:.92rem;}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="./otona_serum_lab_icon.png" alt="Otona Serum Lab">
  <div id="ok">
    <h1>TikTok の認証が完了しました</h1>
    <p>アプリに戻っています…</p>
    <div class="spin"></div>
    <button class="btn" id="manual" type="button">自動で戻らない場合はこちら</button>
  </div>
  <div id="ng" style="display:none">
    <h1>認証がキャンセルされました</h1>
    <div class="err" id="ngmsg">アプリの画面に戻って、もう一度お試しください。</div>
  </div>
</div>
<script>
(function () {
  var LOCAL = "http://localhost:8931/callback";
  var p = new URLSearchParams(window.location.search);

  // 認可コードが公開ページのアドレスバーに残らないよう、まず表示URLを掃除する
  try { history.replaceState(null, "", window.location.pathname); } catch (e) {}

  function showError(msg) {
    document.getElementById("ok").style.display = "none";
    document.getElementById("ng").style.display = "block";
    if (msg) { document.getElementById("ngmsg").textContent = msg; }
  }

  if (p.get("error")) { showError(null); return; }

  var code = p.get("code");
  var state = p.get("state");
  if (!code) {
    showError("認証情報を受け取れませんでした。アプリの画面からもう一度お試しください。");
    return;
  }

  // 転送先は変数の中だけに保持し、画面（リンクの href 等）には一切出さない
  var target = LOCAL + "?code=" + encodeURIComponent(code) +
               (state ? "&state=" + encodeURIComponent(state) : "");

  document.getElementById("manual").addEventListener("click", function () {
    window.location.replace(target);
  });
  setTimeout(function () {
    document.getElementById("manual").style.display = "inline-block";
  }, 3000);

  window.location.replace(target);
})();
</script>
</body>
</html>
